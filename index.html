<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kogemi</title>

<style>
body {
  margin:0;
  font-family: Arial;
  background:#0b1220;
  color:white;
}

header {
  padding:15px;
  display:flex;
  gap:10px;
}

input {
  flex:1;
  padding:10px;
  border-radius:10px;
  border:none;
}

button {
  padding:10px;
  background:#8b5cf6;
  border:none;
  color:white;
  border-radius:10px;
}

#results {
  display:grid;
  grid-template-columns:repeat(2,1fr);
  gap:10px;
  padding:10px;
}

.card {
  background:#111827;
  padding:10px;
  border-radius:10px;
  cursor:pointer;
}

.card img {
  width:100%;
  border-radius:10px;
}

#player {
  position:fixed;
  bottom:0;
  left:0;
  right:0;
  height:40%;
  background:black;
  display:none;
}

iframe {
  width:100%;
  height:100%;
  border:none;
}
</style>
</head>

<body>

<header>
  <input id="searchInput" placeholder="Search anime...">
  <button onclick="search()">Search</button>
</header>

<div id="results"></div>

<div id="player">
  <iframe id="iframe"></iframe>
</div>

<script>

/* 🔥 ONLY THIS LINE MATTERS */
const API = "https://kogemi-api-3.onrender.com"; // <-- YOUR BACKEND

let currentImdb = null;

/* 🔍 SEARCH */
async function search() {
  const q = document.getElementById("searchInput").value;

  const res = await fetch(`${API}/search?q=${q}`);
  const data = await res.json();

  const container = document.getElementById("results");
  container.innerHTML = "";

  data.forEach(anime => {
    const title = anime.title.english || anime.title.romaji;

    const div = document.createElement("div");
    div.className = "card";

    div.innerHTML = `
      <img src="${anime.coverImage.large}">
      <p>${title}</p>
    `;

    div.onclick = () => selectAnime(title);

    container.appendChild(div);
  });
}

/* 🎬 GET IMDB */
async function selectAnime(title) {
  const res = await fetch(`${API}/imdb?title=${encodeURIComponent(title)}`);
  const data = await res.json();

  if (!data.imdb) {
    alert("No stream found");
    return;
  }

  currentImdb = data.imdb;

  playEpisode(1);
}

/* ▶ PLAY */
async function playEpisode(ep) {
  const res = await fetch(`${API}/stream?imdb=${currentImdb}&ep=${ep}`);
  const data = await res.json();

  document.getElementById("iframe").src =
    data.url || data.backup;

  document.getElementById("player").style.display = "block";
}

</script>

</body>
</html>
