<!DOCTYPE html>
<html>
<head>
<title>Kogemi</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>
body{
margin:0;
font-family:Arial;
background:#0b1220;
color:white;
}

/* HEADER */
.header{
padding:15px;
text-align:center;
background:#111827;
font-size:18px;
font-weight:bold;
}

/* SEARCH */
.search{
width:100%;
padding:12px;
border:none;
background:#1f2937;
color:white;
border-radius:10px;
}

/* GRID */
.grid{
display:grid;
grid-template-columns:repeat(2,1fr);
gap:10px;
padding:10px;
}

.card{
background:#1f2937;
border-radius:12px;
overflow:hidden;
cursor:pointer;
transition:0.2s;
}

.card:hover{
transform:scale(1.03);
}

.card img{
width:100%;
height:200px;
object-fit:cover;
}

.card-title{
padding:8px;
font-size:14px;
}

/* WATCH */
.watch{
display:none;
padding:10px;
}

iframe{
width:100%;
aspect-ratio:16/9;
border:none;
border-radius:12px;
}

/* BACK */
.back{
padding:10px;
cursor:pointer;
color:#9ca3af;
}

/* EPISODES */
.episodes{
display:grid;
grid-template-columns:repeat(5,1fr);
gap:6px;
margin-top:10px;
}

.ep{
background:#1f2937;
padding:10px;
border-radius:10px;
text-align:center;
cursor:pointer;
transition:0.2s;
}

.ep:hover{
background:#7c3aed;
}
</style>
</head>

<body>

<div class="header">Kogemi</div>

<!-- HOME -->
<div id="home">

<div style="padding:10px">
<input class="search" placeholder="Search anime..." oninput="searchAnime(this.value)">
</div>

<div class="grid" id="results"></div>

</div>

<!-- WATCH -->
<div id="watch" class="watch">

<div class="back" onclick="goHome()">← Back</div>

<iframe id="player"></iframe>

<div class="episodes" id="episodes"></div>

</div>

<script>

const API = "https://kogemi-api-3.onrender.com";

/* SEARCH */
async function searchAnime(q){

if(!q){
document.getElementById("results").innerHTML="";
return;
}

try{
let res = await fetch(`${API}/search?q=${q}`);
let data = await res.json();
showResults(data);
}catch(e){
console.log(e);
}

}

/* SHOW RESULTS */
function showResults(list){

let container = document.getElementById("results");
container.innerHTML="";

list.forEach(anime=>{

let card = document.createElement("div");
card.className="card";

card.innerHTML = `
<img src="${anime.coverImage.large}">
<div class="card-title">${anime.title.romaji}</div>
`;

card.onclick = ()=>openAnime(anime.title.romaji);

container.appendChild(card);

});

}

/* OPEN ANIME */
async function openAnime(title){

try{

let res = await fetch(`${API}/imdb?title=${title}`);
let data = await res.json();

if(!data.imdb){
alert("No stream found");
return;
}

document.getElementById("home").style.display="none";
document.getElementById("watch").style.display="block";

/* FIRST EPISODE */
playEpisode(data.imdb, 1);
loadEpisodes(data.imdb, 50);

}catch(e){
alert("Error loading anime");
}

}

/* PLAY (FIXED PLAYER) */
async function playEpisode(imdb, ep){

const player = document.getElementById("player");

/* clear player first */
player.src = "";

try{

let res = await fetch(`${API}/stream?imdb=${imdb}&ep=${ep}`);
let data = await res.json();

if(!data.url){
alert("Stream not available");
return;
}

/* load video */
player.src = data.url;

}catch(e){
alert("Error loading video");
}

}

/* LOAD EPISODES */
function loadEpisodes(imdb, total){

let container = document.getElementById("episodes");
container.innerHTML="";

for(let i=1;i<=total;i++){

let ep = document.createElement("div");
ep.className="ep";
ep.innerText=i;

ep.onclick=()=>playEpisode(imdb, i);

container.appendChild(ep);

}

}

/* BACK */
function goHome(){
document.getElementById("watch").style.display="none";
document.getElementById("home").style.display="block";
document.getElementById("player").src="";
}

</script>

</body>
</html>
