<!DOCTYPE html>
<html>
<head>
<title>Kogemi Pro</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>
body{
margin:0;
font-family:Arial;
background:#0b1220;
color:white;
}

/* HEADER */
.header{
padding:15px;
background:#111827;
font-weight:bold;
text-align:center;
}

/* SEARCH */
.search{
width:100%;
padding:12px;
border:none;
outline:none;
background:#1f2937;
color:white;
border-radius:10px;
}

/* GRID */
.grid{
display:grid;
grid-template-columns:repeat(2,1fr);
gap:10px;
padding:10px;
}

.card{
background:#1f2937;
border-radius:10px;
overflow:hidden;
cursor:pointer;
}

.card img{
width:100%;
height:200px;
object-fit:cover;
}

.card-title{
padding:8px;
font-size:14px;
}

/* PLAYER */
.player{
display:none;
padding:10px;
}

iframe{
width:100%;
aspect-ratio:16/9;
border:none;
border-radius:10px;
}

.back{
padding:10px;
cursor:pointer;
color:#9ca3af;
}

</style>
</head>

<body>

<div class="header">Kogemi</div>

<!-- HOME -->
<div id="home">

<div style="padding:10px">
<input class="search" placeholder="Search anime..." oninput="searchAnime(this.value)">
</div>

<div class="grid" id="results"></div>

</div>

<!-- WATCH -->
<div id="watch" style="display:none">

<div class="back" onclick="goHome()">← Back</div>

<div class="player" id="playerBox">
<iframe id="player"></iframe>
</div>

</div>

<script>

/* 🔑 YOUR API KEY */
const API_KEY = "fdc7143eae0ef3d73d0484e1fb87056c";

/* SEARCH */
function searchAnime(q){

if(!q){
document.getElementById("results").innerHTML="";
return;
}

fetch(`https://api.themoviedb.org/3/search/tv?api_key=${API_KEY}&query=${q}`)
.then(res=>res.json())
.then(data=>{
showResults(data.results);
});
}

/* SHOW RESULTS */
function showResults(list){
let container = document.getElementById("results");
container.innerHTML="";

list.forEach(item=>{

if(!item.poster_path) return;

let card = document.createElement("div");
card.className="card";

card.innerHTML = `
<img src="https://image.tmdb.org/t/p/w500${item.poster_path}">
<div class="card-title">${item.name}</div>
`;

card.onclick=()=>openAnime(item.id);

container.appendChild(card);

});
}

/* OPEN ANIME */
function openAnime(tmdbId){

fetch(`https://api.themoviedb.org/3/tv/${tmdbId}?api_key=${API_KEY}&append_to_response=external_ids`)
.then(res=>res.json())
.then(data=>{

let imdb = data.external_ids.imdb_id;

if(!imdb){
alert("No player available 😢");
return;
}

startPlayer(imdb);

});

}

/* START PLAYER */
function startPlayer(imdb){

document.getElementById("home").style.display="none";
document.getElementById("watch").style.display="block";
document.getElementById("playerBox").style.display="block";

/* PLAY EPISODE 1 */
document.getElementById("player").src =
`https://vidfast.pro/tv/${imdb}/1/1?autoPlay=true&theme=7c3aed&nextButton=true&autoNext=true`;

}

/* BACK */
function goHome(){
document.getElementById("watch").style.display="none";
document.getElementById("home").style.display="block";
document.getElementById("player").src="";
}

</script>

</body>
</html>
