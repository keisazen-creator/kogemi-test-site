<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kogemi</title>

<style>
body{margin:0;font-family:system-ui;background:#0b1220;color:white}

/* NAV */
nav{display:flex;justify-content:space-between;padding:15px;background:#0b1220;position:sticky;top:0}
.logo{font-weight:bold;color:#8b5cf6}

/* HERO */
#hero{height:60vh;background-size:cover;display:flex;align-items:flex-end;padding:20px}
.hero-title{font-size:28px;font-weight:bold}

/* ROW */
.section{padding:15px}
.row{display:flex;gap:10px;overflow:auto}
.card{min-width:120px;cursor:pointer}
.card img{width:100%;border-radius:10px}

/* PLAYER */
#player{position:fixed;inset:0;background:black;display:none;flex-direction:column}
iframe{width:100%;height:50%}

/* CONTROLS */
.controls{display:flex;gap:10px;padding:10px}
select{padding:10px;background:#1f2937;color:white;border:none;border-radius:8px}

/* EPISODES */
#episodes{display:grid;grid-template-columns:repeat(auto-fill,minmax(60px,1fr));gap:8px;padding:10px;overflow:auto}
.ep{background:#1f2937;padding:10px;text-align:center;border-radius:8px;cursor:pointer}
.ep.active{background:#8b5cf6}

/* SEARCH */
#searchBox{display:none;padding:10px}
input{width:100%;padding:12px;border-radius:10px;border:none}
</style>
</head>

<body>

<nav>
<div class="logo">Kogemi</div>
<button onclick="toggleSearch()">🔍</button>
</nav>

<div id="searchBox">
<input id="searchInput" placeholder="Search..." onkeyup="search()">
</div>

<div id="hero">
<div class="hero-title" id="heroTitle">Loading...</div>
</div>

<div class="section">
<h3>🔥 Trending</h3>
<div class="row" id="row"></div>
</div>

<div id="player">
<div class="controls">
<button onclick="closePlayer()">✕</button>
<select id="seasonSelect" onchange="changeSeason()"></select>
<button onclick="prevEp()">⏮</button>
<button onclick="nextEp()">⏭</button>
</div>

<iframe id="iframe"></iframe>
<div id="episodes"></div>
</div>

<script>
const API="https://kogemi-api-3.onrender.com";
const JIKAN="https://api.jikan.moe/v4";

let imdb=null,tmdb=null,season=1,currentEp=1,totalEps=12;

/* LOAD HOME */
window.onload=async()=>{
const res=await fetch(`${JIKAN}/top/anime`);
const data=await res.json();

loadHero(data.data[0]);
buildRow(data.data.slice(0,10));
};

/* HERO */
function loadHero(a){
document.getElementById("hero").style.backgroundImage=`url(${a.images.jpg.large_image_url})`;
document.getElementById("heroTitle").innerText=a.title;
}

/* ROW */
function buildRow(list){
const row=document.getElementById("row");
row.innerHTML="";
list.forEach(a=>{
const div=document.createElement("div");
div.className="card";
div.innerHTML=`<img src="${a.images.jpg.image_url}"><p>${a.title}</p>`;
div.onclick=()=>selectAnime(a.title);
row.appendChild(div);
});
}

/* SEARCH */
function toggleSearch(){
const box=document.getElementById("searchBox");
box.style.display=box.style.display==="block"?"none":"block";
}

async function search(){
const q=document.getElementById("searchInput").value;
if(!q)return;

const res=await fetch(`${API}/search?q=${q}`);
const data=await res.json();

buildRow(data.map(a=>({
title:a.title.romaji,
images:{jpg:{image_url:a.coverImage.large}}
})));
}

/* SELECT */
async function selectAnime(title){
const clean=title.split(":")[0];

const epRes=await fetch(`${API}/anime-info?title=${encodeURIComponent(clean)}`);
const epData=await epRes.json();
totalEps=epData.episodes||12;

const res=await fetch(`${API}/imdb?title=${encodeURIComponent(clean)}`);
const data=await res.json();

if(!data.imdb){alert("No stream");return;}

imdb=data.imdb;
tmdb=data.tmdb;

buildSeasons(1);
buildEpisodes();
playEpisode(1);

document.getElementById("player").style.display="flex";
}

/* SEASONS */
function buildSeasons(n){
const s=document.getElementById("seasonSelect");
s.innerHTML="";
for(let i=1;i<=n;i++){
const o=document.createElement("option");
o.value=i;o.text="Season "+i;
s.appendChild(o);
}
}

function changeSeason(){
season=document.getElementById("seasonSelect").value;
playEpisode(1);
}

/* PLAY */
async function playEpisode(ep){
currentEp=ep;

const res=await fetch(`${API}/stream?imdb=${imdb}&season=${season}&ep=${ep}`);
const data=await res.json();

document.getElementById("iframe").src=data.primary||data.backup;

highlight();
}

/* EP */
function buildEpisodes(){
const box=document.getElementById("episodes");
box.innerHTML="";
for(let i=1;i<=totalEps;i++){
const d=document.createElement("div");
d.className="ep";
d.innerText=i;
d.onclick=()=>playEpisode(i);
box.appendChild(d);
}
}

function highlight(){
document.querySelectorAll(".ep").forEach(e=>e.classList.remove("active"));
document.querySelectorAll(".ep")[currentEp-1]?.classList.add("active");
}

/* NAV */
function nextEp(){if(currentEp<totalEps)playEpisode(currentEp+1);}
function prevEp(){if(currentEp>1)playEpisode(currentEp-1);}
function closePlayer(){
document.getElementById("player").style.display="none";
document.getElementById("iframe").src="";
}
</script>

</body>
</html>
