<!DOCTYPE html>
<html>
<head>
<title>Kogemi</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>
body{
margin:0;
font-family:Arial;
background:#0b1220;
color:white;
}

.header{
padding:15px;
text-align:center;
background:#111827;
font-weight:bold;
}

.search{
width:100%;
padding:12px;
border:none;
outline:none;
background:#1f2937;
color:white;
border-radius:10px;
}

.grid{
display:grid;
grid-template-columns:repeat(2,1fr);
gap:10px;
padding:10px;
}

.card{
background:#1f2937;
border-radius:10px;
overflow:hidden;
cursor:pointer;
}

.card img{
width:100%;
height:200px;
object-fit:cover;
}

.card-title{
padding:8px;
font-size:14px;
}

.watch-page{
display:none;
padding:10px;
}

iframe{
width:100%;
aspect-ratio:16/9;
border:none;
border-radius:10px;
}

.back{
margin:10px;
cursor:pointer;
color:#9ca3af;
}

.episodes{
display:grid;
grid-template-columns:repeat(5,1fr);
gap:5px;
margin-top:10px;
}

.ep{
background:#1f2937;
padding:8px;
text-align:center;
border-radius:8px;
cursor:pointer;
}

.ep:hover{
background:#7c3aed;
}

</style>
</head>

<body>

<div class="header">Kogemi</div>

<div id="home">

<div style="padding:10px">
<input class="search" placeholder="Search anime..." oninput="searchAnime(this.value)">
</div>

<div class="grid" id="animeList"></div>

</div>

<div class="watch-page" id="watchPage">

<div class="back" onclick="goHome()">← Back</div>

<iframe id="player"></iframe>

<div class="episodes" id="episodes"></div>

</div>

<script>

/* 🔥 PRESET ANIME DATABASE */
const animeList = [
{name:"One Piece", img:"https://m.media-amazon.com/images/I/81f8b3M7bPL.jpg", id:"tt0388629"},
{name:"Naruto", img:"https://m.media-amazon.com/images/I/81j7nZ1pYcL.jpg", id:"tt0409591"},
{name:"Attack on Titan", img:"https://m.media-amazon.com/images/I/91nZcPpZ5lL.jpg", id:"tt2560140"},
{name:"Death Note", img:"https://m.media-amazon.com/images/I/71Q1Iu4suSL.jpg", id:"tt0877057"},
{name:"Demon Slayer", img:"https://m.media-amazon.com/images/I/81k+Z7Hh5FL.jpg", id:"tt9335498"},
{name:"Jujutsu Kaisen", img:"https://m.media-amazon.com/images/I/81s+5p9rHjL.jpg", id:"tt12343534"}
];

/* LOAD */
function loadAnime(list=animeList){
let container = document.getElementById("animeList");
container.innerHTML="";

list.forEach(anime=>{
let card = document.createElement("div");
card.className="card";

card.innerHTML = `
<img src="${anime.img}">
<div class="card-title">${anime.name}</div>
`;

card.onclick=()=>openAnime(anime);

container.appendChild(card);
});
}

/* SEARCH */
function searchAnime(q){
q=q.toLowerCase();

let filtered = animeList.filter(a =>
a.name.toLowerCase().includes(q)
);

loadAnime(filtered);
}

/* OPEN */
function openAnime(anime){
document.getElementById("home").style.display="none";
document.getElementById("watchPage").style.display="block";

playEpisode(1, anime.id);
loadEpisodes(anime.id, 50);
}

/* PLAY */
function playEpisode(ep, id){
document.getElementById("player").src =
`https://vidfast.pro/tv/${id}/1/${ep}?autoPlay=true&theme=7c3aed&nextButton=true&autoNext=true`;
}

/* EPISODES */
function loadEpisodes(id, total){
let container = document.getElementById("episodes");
container.innerHTML="";

for(let i=1;i<=total;i++){
let ep = document.createElement("div");
ep.className="ep";
ep.innerText=i;

ep.onclick=()=>playEpisode(i,id);

container.appendChild(ep);
}
}

/* BACK */
function goHome(){
document.getElementById("watchPage").style.display="none";
document.getElementById("home").style.display="block";
}

/* INIT */
loadAnime();

</script>

</body>
</html>
