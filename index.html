<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kogemi Pro</title>

<style>
:root {
  --bg: #0b1220;
  --card: rgba(255,255,255,0.05);
  --primary: linear-gradient(135deg,#7B3FE4,#B06CFF);
}

body {
  margin:0;
  font-family: system-ui;
  background: var(--bg);
  color:white;
}

/* HEADER */
.header {
  padding:15px;
  display:flex;
  justify-content:space-between;
  align-items:center;
}

.logo {
  font-size:20px;
  font-weight:bold;
  background: var(--primary);
  -webkit-background-clip:text;
  color:transparent;
}

/* SEARCH */
.search {
  padding:10px;
}

.search input {
  width:100%;
  padding:12px;
  border-radius:12px;
  border:none;
  outline:none;
  background:rgba(255,255,255,0.1);
  color:white;
}

/* GRID */
.grid {
  display:grid;
  grid-template-columns: repeat(auto-fill,minmax(140px,1fr));
  gap:12px;
  padding:10px;
}

.card {
  background: var(--card);
  border-radius:14px;
  overflow:hidden;
  cursor:pointer;
  backdrop-filter: blur(10px);
  transition:0.3s;
}

.card:hover {
  transform:scale(1.05);
}

.card img {
  width:100%;
  height:200px;
  object-fit:cover;
}

.card p {
  padding:8px;
  font-size:13px;
}

/* DETAIL */
.detail {
  display:none;
  padding:15px;
}

.detail img {
  width:100%;
  border-radius:14px;
}

.btn {
  background: var(--primary);
  padding:12px;
  border-radius:12px;
  margin-top:10px;
  text-align:center;
  cursor:pointer;
}

/* PLAYER */
.player {
  display:none;
  padding:10px;
}

iframe {
  width:100%;
  height:220px;
  border:none;
  border-radius:12px;
}

/* EPISODES */
.episodes {
  display:grid;
  grid-template-columns: repeat(5,1fr);
  gap:8px;
  margin-top:10px;
}

.ep {
  padding:10px;
  background: var(--card);
  border-radius:10px;
  text-align:center;
  cursor:pointer;
}

.ep.active {
  background:#7B3FE4;
}
</style>
</head>

<body>

<div class="header">
  <div class="logo">Kogemi Pro</div>
</div>

<div class="search">
  <input id="searchInput" placeholder="Search anime...">
</div>

<div id="grid" class="grid"></div>

<div id="detail" class="detail"></div>

<div id="player" class="player"></div>

<script>
const JIKAN = "https://api.jikan.moe/v4";
const TMDB_KEY = "fdc7143eae0ef3d73d0484e1fb87056c";

let currentAnime = null;
let imdbId = null;

/* LOAD TRENDING */
async function loadTrending() {
  const res = await fetch(`${JIKAN}/top/anime`);
  const data = await res.json();
  renderGrid(data.data);
}

/* RENDER GRID */
function renderGrid(list) {
  const grid = document.getElementById("grid");
  grid.innerHTML = "";

  list.forEach(a => {
    const card = document.createElement("div");
    card.className = "card";

    card.innerHTML = `
      <img src="${a.images.jpg.image_url}">
      <p>${a.title}</p>
    `;

    card.onclick = () => openDetail(a);
    grid.appendChild(card);
  });
}

/* SEARCH (debounced) */
let timeout;
document.getElementById("searchInput").addEventListener("input", e => {
  clearTimeout(timeout);
  timeout = setTimeout(() => searchAnime(e.target.value), 400);
});

async function searchAnime(q) {
  if (!q) return loadTrending();
  const res = await fetch(`${JIKAN}/anime?q=${q}`);
  const data = await res.json();
  renderGrid(data.data);
}

/* DETAIL PAGE */
async function openDetail(anime) {
  currentAnime = anime;

  document.getElementById("grid").style.display = "none";
  const d = document.getElementById("detail");
  d.style.display = "block";

  d.innerHTML = `
    <img src="${anime.images.jpg.large_image_url}">
    <h2>${anime.title}</h2>
    <p>⭐ ${anime.score || "N/A"}</p>
    <p>${anime.synopsis || ""}</p>
    <div class="btn" onclick="startWatching()">▶ Watch Now</div>
  `;
}

/* TMDB → IMDB */
async function getImdbId(title) {
  try {
    const search = await fetch(
      `https://api.themoviedb.org/3/search/tv?api_key=${TMDB_KEY}&query=${encodeURIComponent(title)}`
    );
    const sData = await search.json();

    if (!sData.results.length) return null;

    const id = sData.results[0].id;

    const ext = await fetch(
      `https://api.themoviedb.org/3/tv/${id}/external_ids?api_key=${TMDB_KEY}`
    );
    const eData = await ext.json();

    return eData.imdb_id;
  } catch {
    return null;
  }
}

/* WATCH */
async function startWatching() {
  imdbId = await getImdbId(currentAnime.title);

  if (!imdbId) {
    alert("Streaming not available");
    return;
  }

  document.getElementById("detail").style.display = "none";

  const player = document.getElementById("player");
  player.style.display = "block";

  loadEpisode(1);
  renderEpisodes(100);
}

/* LOAD EPISODE */
function loadEpisode(ep) {
  localStorage.setItem("lastEp", ep);

  const url = `https://vidfast.pro/tv/${imdbId}/1/${ep}?autoPlay=true&theme=7c3aed&nextButton=true&autoNext=true`;

  document.getElementById("player").innerHTML = `
    <iframe src="${url}" allowfullscreen></iframe>
    <div class="episodes" id="eps"></div>
  `;
}

/* EPISODES */
function renderEpisodes(count) {
  const eps = document.getElementById("eps");

  for (let i = 1; i <= count; i++) {
    const btn = document.createElement("div");
    btn.className = "ep";
    btn.innerText = i;

    btn.onclick = () => {
      loadEpisode(i);
      document.querySelectorAll(".ep").forEach(e => e.classList.remove("active"));
      btn.classList.add("active");
    };

    eps.appendChild(btn);
  }
}

/* INIT */
loadTrending();
</script>

</body>
</html>
