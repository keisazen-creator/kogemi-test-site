<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kogemi Pro</title>

<style>
body{margin:0;background:#0b1220;color:white;font-family:sans-serif;}
nav{display:flex;justify-content:space-between;padding:15px;background:#0b1220;}
.logo{background:#8b5cf6;padding:10px;border-radius:10px;}
.row{display:flex;overflow:auto;gap:10px;padding:10px;}
.card{min-width:120px;}
.card img{width:100%;border-radius:10px;}
#player{position:fixed;inset:0;background:#000;display:none;flex-direction:column;}
iframe{width:100%;height:50%;}
#episodes{display:grid;grid-template-columns:repeat(auto-fill,minmax(60px,1fr));gap:8px;padding:10px;}
.ep{background:#1f2937;padding:10px;text-align:center;border-radius:8px;cursor:pointer;}
.ep.active{background:#8b5cf6;}
.controls{display:flex;gap:10px;padding:10px;}
select{padding:10px;border-radius:10px;background:#1f2937;color:white;border:none;}
</style>
</head>

<body>

<nav>
  <div class="logo">K</div>
</nav>

<div class="row" id="trending"></div>

<div id="player">
  <button onclick="closePlayer()">✕</button>

  <!-- SEASON -->
  <div class="controls">
    <select id="seasonSelect" onchange="changeSeason()">
      <option value="1">Season 1</option>
      <option value="2">Season 2</option>
      <option value="3">Season 3</option>
    </select>
  </div>

  <iframe id="iframe"></iframe>
  <div id="episodes"></div>
</div>

<script>
const API="https://kogemi-api-3.onrender.com";
const JIKAN="https://api.jikan.moe/v4";

let currentImdb=null;
let currentEp=1;
let totalEps=12;
let currentSeason=1;
let currentTitle="";

/* LOAD HOME */
window.onload=async()=>{
  const res=await fetch(`${JIKAN}/top/anime`);
  const data=await res.json();

  const row=document.getElementById("trending");

  data.data.slice(0,10).forEach(a=>{
    const div=document.createElement("div");
    div.className="card";
    div.innerHTML=`<img src="${a.images.jpg.image_url}"><p>${a.title}</p>`;
    div.onclick=()=>selectAnime(a.title);
    row.appendChild(div);
  });

  loadContinue();
};

/* SELECT */
async function selectAnime(title){
  currentTitle=title;
  const clean=title.split(":")[0];

  // EP COUNT
  try{
    const j=await fetch(`${JIKAN}/anime?q=${clean}&limit=1`);
    const jd=await j.json();
    totalEps=jd.data[0].episodes||12;
  }catch{totalEps=12;}

  const res=await fetch(`${API}/imdb?title=${encodeURIComponent(clean)}`);
  const data=await res.json();

  if(!data.imdb){alert("No stream");return;}

  currentImdb=data.imdb;

  buildEpisodes();
  playEpisode(1);

  document.getElementById("player").style.display="flex";
}

/* PLAY */
async function playEpisode(ep){
  currentEp=ep;

  const res=await fetch(`${API}/stream?imdb=${currentImdb}&ep=${ep}`);
  const data=await res.json();

  let url=data.url;

  // 🔥 FALLBACK
  if(!url){
    url=`https://vidsrc.xyz/embed/tv/${currentImdb}/${currentSeason}/${ep}`;
  }

  document.getElementById("iframe").src=url;

  highlight();
  saveProgress();

  // 🔥 AUTO NEXT (25 min)
  clearTimeout(window.autoNext);
  window.autoNext=setTimeout(()=>{
    nextEpisode();
  }, 25*60*1000);
}

/* NEXT */
function nextEpisode(){
  if(currentEp<totalEps){
    playEpisode(currentEp+1);
  }
}

/* SEASON CHANGE */
function changeSeason(){
  currentSeason=document.getElementById("seasonSelect").value;
  playEpisode(1);
}

/* EPISODES */
function buildEpisodes(){
  const box=document.getElementById("episodes");
  box.innerHTML="";

  for(let i=1;i<=totalEps;i++){
    const d=document.createElement("div");
    d.className="ep";
    d.innerText=i;
    d.onclick=()=>playEpisode(i);
    box.appendChild(d);
  }
}

/* ACTIVE */
function highlight(){
  document.querySelectorAll(".ep").forEach(e=>e.classList.remove("active"));
  document.querySelectorAll(".ep")[currentEp-1]?.classList.add("active");
}

/* CLOSE */
function closePlayer(){
  document.getElementById("player").style.display="none";
  document.getElementById("iframe").src="";
}

/* 💾 SAVE WATCH */
function saveProgress(){
  const data={
    title:currentTitle,
    imdb:currentImdb,
    ep:currentEp,
    time:Date.now()
  };

  localStorage.setItem("continue",JSON.stringify(data));

  let history=JSON.parse(localStorage.getItem("history")||"[]");
  history.unshift(data);
  localStorage.setItem("history",JSON.stringify(history.slice(0,20)));
}

/* 🔁 CONTINUE */
function loadContinue(){
  const data=JSON.parse(localStorage.getItem("continue"));
  if(!data) return;

  const div=document.createElement("div");
  div.style.padding="10px";
  div.innerHTML=`▶ Continue ${data.title} (Ep ${data.ep})`;

  div.onclick=()=>{
    currentImdb=data.imdb;
    currentTitle=data.title;
    playEpisode(data.ep);
    document.getElementById("player").style.display="flex";
  };

  document.body.prepend(div);
}
</script>

</body>
</html>
