<!DOCTYPE html>
<html>
<head>
<title>Kogemi Pro</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>
body{
margin:0;
font-family:Arial;
background:#0b1220;
color:white;
}

/* HEADER */
.header{
padding:15px;
text-align:center;
background:#111827;
font-weight:bold;
font-size:18px;
}

/* SEARCH */
.search{
width:100%;
padding:12px;
border:none;
outline:none;
background:#1f2937;
color:white;
border-radius:10px;
}

/* GRID */
.grid{
display:grid;
grid-template-columns:repeat(2,1fr);
gap:10px;
padding:10px;
}

.card{
background:#1f2937;
border-radius:12px;
overflow:hidden;
cursor:pointer;
transition:0.2s;
}

.card:hover{
transform:scale(1.03);
}

.card img{
width:100%;
height:200px;
object-fit:cover;
}

.card-title{
padding:8px;
font-size:14px;
}

/* WATCH PAGE */
.watch{
display:none;
padding:10px;
}

iframe{
width:100%;
aspect-ratio:16/9;
border:none;
border-radius:12px;
}

.back{
margin:10px;
cursor:pointer;
color:#9ca3af;
}

/* EPISODES */
.episodes{
display:grid;
grid-template-columns:repeat(5,1fr);
gap:6px;
margin-top:10px;
}

.ep{
background:#1f2937;
padding:10px;
border-radius:10px;
text-align:center;
cursor:pointer;
}

.ep:hover{
background:#7c3aed;
}

</style>
</head>

<body>

<div class="header">Kogemi</div>

<!-- HOME -->
<div id="home">

<div style="padding:10px">
<input class="search" placeholder="Search anime..." oninput="searchAnime(this.value)">
</div>

<div class="grid" id="results"></div>

</div>

<!-- WATCH -->
<div id="watch" class="watch">

<div class="back" onclick="goHome()">← Back</div>

<iframe id="player"></iframe>

<div class="episodes" id="episodes"></div>

</div>

<script>

/* 🔥 ANIME → IMDB MAP (expand this later) */
const animeMap = {
"One Piece": "tt0388629",
"Naruto": "tt0409591",
"Attack on Titan": "tt2560140",
"Death Note": "tt0877057",
"Demon Slayer": "tt9335498",
"Jujutsu Kaisen": "tt12343534",
"Bleach": "tt0434665",
"Tokyo Ghoul": "tt3741632"
};

/* 🔍 SEARCH (JIKAN) */
function searchAnime(q){

if(!q){
document.getElementById("results").innerHTML="";
return;
}

fetch(`https://api.jikan.moe/v4/anime?q=${encodeURIComponent(q)}`)
.then(res=>res.json())
.then(data=>{
showResults(data.data || []);
})
.catch(err=>console.log(err));

}

/* 🎴 SHOW RESULTS */
function showResults(list){
let container = document.getElementById("results");
container.innerHTML="";

list.forEach(anime=>{

if(!anime.images?.jpg?.image_url) return;

let card = document.createElement("div");
card.className="card";

card.innerHTML = `
<img src="${anime.images.jpg.image_url}">
<div class="card-title">${anime.title}</div>
`;

card.onclick=()=>openAnime(anime);

container.appendChild(card);

});
}

/* ▶ OPEN ANIME */
function openAnime(anime){

let id = animeMap[anime.title];

if(!id){
alert("⚠️ No stream available yet (only popular anime supported)");
return;
}

document.getElementById("home").style.display="none";
document.getElementById("watch").style.display="block";

playEpisode(1, id);
loadEpisodes(id, 50);

}

/* ▶ PLAY */
function playEpisode(ep, id){
document.getElementById("player").src =
`https://vidfast.pro/tv/${id}/1/${ep}?autoPlay=true&theme=7c3aed&nextButton=true&autoNext=true`;
}

/* 📺 EPISODES */
function loadEpisodes(id, total){
let container = document.getElementById("episodes");
container.innerHTML="";

for(let i=1;i<=total;i++){
let ep = document.createElement("div");
ep.className="ep";
ep.innerText=i;

ep.onclick=()=>playEpisode(i,id);

container.appendChild(ep);
}
}

/* 🔙 BACK */
function goHome(){
document.getElementById("watch").style.display="none";
document.getElementById("home").style.display="block";
document.getElementById("player").src="";
}

</script>

</body>
</html>
