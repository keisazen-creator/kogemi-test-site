<!DOCTYPE html>
<html>
<head>
<title>One Piece</title> 
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>

body{
background:#111827;
color:white;
font-family:Arial;
text-align:center;
}

.container{
max-width:900px;
margin:auto;
padding:20px;
}

iframe{
width:100%;
height:500px;
border:none;
border-radius:10px;
}

button{
padding:10px 20px;
margin:5px;
background:#ef4444;
color:white;
border:none;
border-radius:6px;
cursor:pointer;
}

button:hover{
background:#dc2626;
}

</style>

</head>

<body>

<div class="container">

<h1>One Piece</h1>
<h3>Episode</h3>

<iframe id="player"
src="https://vidfast.pro/tv/tt0388629/1/1?autoPlay=true"
allowfullscreen>
</iframe>

<br><br>

<button onclick="playEpisode('https://vidfast.pro/tv/tt0388629/1/1?autoPlay=true')">
Episode 1
</button>

</div>

<script>

function playEpisode(link){
document.getElementById("player").src = link;
}

</script>

</body>
</html>
