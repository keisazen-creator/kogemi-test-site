<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kogemi</title>

<style>
body {
  margin:0;
  font-family: system-ui;
  background:#0b1220;
  color:white;
}

/* HEADER */
.header {
  display:flex;
  justify-content:space-between;
  padding:15px;
  font-weight:bold;
  background:rgba(255,255,255,0.05);
  backdrop-filter:blur(10px);
}

.logo {
  background:linear-gradient(135deg,#7B3FE4,#B06CFF);
  -webkit-background-clip:text;
  color:transparent;
  font-size:20px;
}

/* SEARCH */
.search {
  padding:10px;
}
.search input {
  width:100%;
  padding:12px;
  border-radius:12px;
  border:none;
  background:rgba(255,255,255,0.1);
  color:white;
}

/* GRID */
.grid {
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(140px,1fr));
  gap:12px;
  padding:10px;
}

.card {
  background:rgba(255,255,255,0.05);
  border-radius:14px;
  overflow:hidden;
  transition:0.3s;
}
.card:hover { transform:scale(1.05); }

.card img {
  width:100%;
  height:200px;
  object-fit:cover;
}
.card p { padding:8px; font-size:13px; }

/* PLAYER */
.player {
  display:none;
  padding:10px;
}

.ratio {
  position:relative;
  padding-bottom:56.25%;
}

iframe {
  position:absolute;
  width:100%;
  height:100%;
  border:none;
  border-radius:12px;
}

/* EPISODES */
.episodes {
  display:grid;
  grid-template-columns:repeat(6,1fr);
  gap:8px;
  margin-top:10px;
}

.ep {
  padding:10px;
  background:rgba(255,255,255,0.05);
  border-radius:10px;
  text-align:center;
  cursor:pointer;
}

.ep.active {
  background:#7B3FE4;
}
</style>
</head>

<body>

<div class="header">
  <div class="logo">Kogemi Pro</div>
</div>

<div class="search">
  <input id="searchInput" placeholder="Search anime...">
</div>

<div id="grid" class="grid"></div>

<div id="player" class="player">
  <div class="ratio">
    <iframe id="vidfast-player"></iframe>
  </div>
  <div id="episodes" class="episodes"></div>
</div>

<script>
const JIKAN = "https://api.jikan.moe/v4";
const TMDB_KEY = "fdc7143eae0ef3d73d0484e1fb87056c";

let currentImdb = null;

/* LOAD TRENDING */
async function loadTrending() {
  const res = await fetch(`${JIKAN}/top/anime`);
  const data = await res.json();
  renderGrid(data.data);
}

/* GRID */
function renderGrid(list) {
  const grid = document.getElementById("grid");
  grid.innerHTML = "";

  list.forEach(anime => {
    const card = document.createElement("div");
    card.className = "card";

    card.innerHTML = `
      <img loading="lazy" src="${anime.images.jpg.image_url}">
      <p>${anime.title}</p>
    `;

    card.onclick = () => openAnime(anime.title);
    grid.appendChild(card);

    // 🔥 PRELOAD IMDB (no delay later)
    getImdbId(anime.title);
  });
}

/* SEARCH */
let timeout;
searchInput.oninput = e => {
  clearTimeout(timeout);
  timeout = setTimeout(() => searchAnime(e.target.value), 400);
};

async function searchAnime(q) {
  if (!q) return loadTrending();
  const res = await fetch(`${JIKAN}/anime?q=${q}`);
  const data = await res.json();
  renderGrid(data.data);
}

/* TMDB + CACHE */
async function getImdbId(title) {
  const key = "imdb_" + title;
  let cached = localStorage.getItem(key);
  if (cached) return cached;

  try {
    const search = await fetch(
      `https://api.themoviedb.org/3/search/tv?api_key=${TMDB_KEY}&query=${encodeURIComponent(title)}`
    );
    const data = await search.json();
    if (!data.results.length) return null;

    const id = data.results[0].id;

    const ext = await fetch(
      `https://api.themoviedb.org/3/tv/${id}/external_ids?api_key=${TMDB_KEY}`
    );
    const extData = await ext.json();

    localStorage.setItem(key, extData.imdb_id);
    return extData.imdb_id;

  } catch {
    return null;
  }
}

/* OPEN ANIME */
async function openAnime(title) {
  document.getElementById("grid").style.display = "none";
  document.getElementById("player").style.display = "block";

  // skeleton loading
  document.getElementById("vidfast-player").src = "";

  const imdb = await getImdbId(title);

  if (!imdb) {
    alert("Streaming not available");
    return;
  }

  currentImdb = imdb;

  loadEpisode(1);
  renderEpisodes(50);
}

/* LOAD EP */
function loadEpisode(ep) {
  const url = `https://vidfast.pro/tv/${currentImdb}/1/${ep}?autoPlay=true&theme=7c3aed&nextButton=true&autoNext=true`;

  document.getElementById("vidfast-player").src = url;

  localStorage.setItem("last_ep", ep);
}

/* EPISODES */
function renderEpisodes(count) {
  const container = document.getElementById("episodes");
  container.innerHTML = "";

  for (let i = 1; i <= count; i++) {
    const el = document.createElement("div");
    el.className = "ep";
    el.innerText = i;

    el.onclick = () => {
      loadEpisode(i);
      document.querySelectorAll(".ep").forEach(e=>e.classList.remove("active"));
      el.classList.add("active");
    };

    container.appendChild(el);
  }
}

/* WATCH PARTY CONTROLLER */
class WatchPartyController {
  constructor(iframe) {
    this.iframe = iframe;
    this.setup();
  }

  setup() {
    window.addEventListener("message", e => {
      if (!e.data) return;

      if (e.data.type === "PLAYER_EVENT") {
        console.log("Player Event:", e.data);
      }
    });
  }

  syncPlay(time) {
    this.iframe.contentWindow.postMessage({ command:"play", time }, "*");
  }

  syncPause(time) {
    this.iframe.contentWindow.postMessage({ command:"pause", time }, "*");
  }

  syncSeek(time) {
    this.iframe.contentWindow.postMessage({ command:"seek", time }, "*");
  }
}

const party = new WatchPartyController(
  document.getElementById("vidfast-player")
);

/* INIT */
loadTrending();
</script>

</body>
</html>
