<!DOCTYPE html>
<html>
<head>
<title>Kogemi</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>

<style>

/* BASE */
body{
margin:0;
font-family:Arial;
background:#0b1220;
color:white;
}

/* HEADER */
.header{
display:flex;
justify-content:space-between;
align-items:center;
padding:15px;
background:#111827;
}

.logo{
background:linear-gradient(45deg,#7c3aed,#a855f7);
padding:10px;
border-radius:12px;
font-weight:bold;
}

.menu{
font-size:20px;
}

/* SEARCH */
.search-box{
padding:10px;
}

.search{
width:100%;
padding:12px;
border:none;
background:#1f2937;
color:white;
border-radius:12px;
}

/* GRID */
.grid{
display:grid;
grid-template-columns:repeat(2,1fr);
gap:12px;
padding:10px;
}

.card{
background:#1f2937;
border-radius:15px;
overflow:hidden;
cursor:pointer;
transition:0.3s;
}

.card:hover{
transform:scale(1.05);
box-shadow:0 0 10px #7c3aed;
}

.card img{
width:100%;
height:200px;
object-fit:cover;
}

.card-title{
padding:8px;
font-size:14px;
}

/* WATCH */
.watch{
display:none;
}

/* HERO */
.hero{
position:relative;
height:220px;
background-size:cover;
background-position:center;
}

.overlay{
position:absolute;
width:100%;
height:100%;
background:linear-gradient(to bottom, transparent, #0b1220);
}

.hero-content{
position:absolute;
bottom:10px;
left:15px;
}

.hero-title{
font-size:22px;
font-weight:bold;
}

/* PLAYER */
.player-box{
padding:10px;
}

video{
width:100%;
border-radius:12px;
}

/* EPISODES */
.episodes{
display:grid;
grid-template-columns:repeat(5,1fr);
gap:8px;
padding:10px;
}

.ep{
background:#1f2937;
padding:10px;
border-radius:10px;
text-align:center;
cursor
