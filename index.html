<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kogemi Pro</title>

<style>
:root {
  --bg:#0b1220;
  --surface:#161d2f;
  --accent:#8b5cf6;
  --text:#fff;
  --muted:#94a3b8;
}

body{
  margin:0;
  background:var(--bg);
  color:var(--text);
  font-family:system-ui;
}

/* NAV */
header{
  position:fixed;
  top:0;
  width:100%;
  padding:15px;
  display:flex;
  justify-content:space-between;
  background:#0b1220;
  z-index:1000;
}

.logo{font-weight:bold;color:var(--accent);cursor:pointer;}

.search-wrapper{position:relative;width:40%;}
.search-input{
  width:100%;
  padding:10px;
  border-radius:20px;
  border:none;
  background:var(--surface);
  color:white;
}

#search-results{
  position:absolute;
  top:110%;
  width:100%;
  background:var(--surface);
  max-height:300px;
  overflow:auto;
  display:none;
  z-index:9999;
  border-radius:10px;
}

.search-item{
  display:flex;
  gap:10px;
  padding:10px;
  cursor:pointer;
}
.search-item:hover{background:#222;}
.search-item img{width:40px;height:60px;}

/* HERO */
#hero{
  height:65vh;
  display:flex;
  align-items:end;
  padding:20px;
  background-size:cover;
}

.hero-title{
  font-size:2rem;
  font-weight:bold;
}

/* ROW */
.section-title{
  padding:20px;
  color:var(--muted);
}

.row{
  display:flex;
  gap:10px;
  overflow:auto;
  padding:10px;
}

.card{
  min-width:140px;
  cursor:pointer;
}
.card img{
  width:100%;
  height:200px;
  object-fit:cover;
  border-radius:10px;
}
.card-info{
  font-size:0.8rem;
}

/* PLAYER */
#player{
  position:fixed;
  inset:0;
  background:black;
  display:none;
  flex-direction:column;
  z-index:2000;
}

iframe{
  width:100%;
  height:60%;
}

#episodes{
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(50px,1fr));
  gap:5px;
  padding:10px;
}

.ep{
  background:#222;
  padding:8px;
  text-align:center;
  cursor:pointer;
}
.ep.active{background:var(--accent);}
</style>
</head>

<body>

<header>
  <div class="logo" onclick="location.reload()">KOGEMI</div>

  <div class="search-wrapper">
    <input id="search-input" class="search-input" placeholder="Search anime...">
    <div id="search-results"></div>
  </div>
</header>

<div id="hero">
  <div id="hero-content"></div>
</div>

<h3 class="section-title">🔥 Trending</h3>
<div class="row" id="trending"></div>

<div id="player">
  <button onclick="closePlayer()">❌ Close</button>
  <iframe id="frame"></iframe>
  <div id="episodes"></div>
</div>

<script>
const API="https://kogemi-api-3.onrender.com";
const JIKAN="https://api.jikan.moe/v4";

let imdb=null;
let currentEp=1;
let totalEps=12;

/* HOME */
window.onload=async()=>{
  const res=await fetch(`${JIKAN}/top/anime`);
  const data=await res.json();

  const hero=data.data[0];

  document.getElementById("hero").style.backgroundImage=
    `url(${hero.images.jpg.large_image_url})`;

  document.getElementById("hero-content").innerHTML=`
    <div class="hero-title">${hero.title}</div>
    <button onclick="loadAnime('${hero.title.replace(/'/g,"\\'")}')">▶ Watch</button>
  `;

  buildRow(data.data);
};

/* ROW */
function buildRow(list){
  const row=document.getElementById("trending");
  row.innerHTML="";

  list.forEach(a=>{
    const div=document.createElement("div");
    div.className="card";

    div.innerHTML=`
      <img src="${a.images.jpg.image_url}">
      <div class="card-info">${a.title}</div>
    `;

    div.onclick=()=>loadAnime(a.title);
    row.appendChild(div);
  });
}

/* SEARCH */
const input=document.getElementById("search-input");
const results=document.getElementById("search-results");

input.addEventListener("input",()=>{
  clearTimeout(window.t);
  const q=input.value.trim();

  if(q.length<3){
    results.style.display="none";
    return;
  }

  window.t=setTimeout(async()=>{
    const res=await fetch(`${API}/search?q=${q}`);
    const data=await res.json();

    results.innerHTML=data.map(a=>{
      const title=a.title.english||a.title.romaji;
      return `
        <div class="search-item"
          onclick="loadAnime('${title.replace(/'/g,"\\'")}')">
          <img src="${a.coverImage.large}">
          <div>${title}</div>
        </div>
      `;
    }).join("");

    results.style.display="block";
  },300);
});

/* LOAD */
async function loadAnime(title){
  results.style.display="none";

  const [meta,im]=await Promise.all([
    fetch(`${API}/anime-info?title=${encodeURIComponent(title)}`),
    fetch(`${API}/imdb?title=${encodeURIComponent(title)}`)
  ]);

  const m=await meta.json();
  const i=await im.json();

  if(!i.imdb){
    alert("No stream found");
    return;
  }

  imdb=i.imdb;
  totalEps=m.episodes||12;

  buildEpisodes();
  play(1);

  document.getElementById("player").style.display="flex";
}

/* PLAY */
async function play(ep){
  currentEp=ep;

  const res=await fetch(`${API}/stream?imdb=${imdb}&ep=${ep}`);
  const data=await res.json();

  document.getElementById("frame").src=
    data.primary||data.backup;

  highlight();
}

/* EPISODES */
function buildEpisodes(){
  const box=document.getElementById("episodes");
  box.innerHTML="";

  for(let i=1;i<=totalEps;i++){
    const d=document.createElement("div");
    d.className="ep";
    d.innerText=i;
    d.onclick=()=>play(i);
    box.appendChild(d);
  }
}

function highlight(){
  document.querySelectorAll(".ep").forEach(e=>e.classList.remove("active"));
  document.querySelectorAll(".ep")[currentEp-1]?.classList.add("active");
}

/* CLOSE */
function closePlayer(){
  document.getElementById("player").style.display="none";
  document.getElementById("frame").src="";
}
</script>

</body>
</html>
