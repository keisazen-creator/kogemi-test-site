<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kogemi Pro</title>

<style>
body {
  margin:0;
  font-family: Arial;
  background:#0b1220;
  color:white;
}

/* NAV */
header {
  padding:15px;
  display:flex;
  gap:10px;
  position:sticky;
  top:0;
  background:#0b1220;
}

input {
  flex:1;
  padding:12px;
  border-radius:10px;
  border:none;
}

button {
  padding:10px;
  background:#8b5cf6;
  border:none;
  color:white;
  border-radius:10px;
}

/* GRID */
#results {
  display:grid;
  grid-template-columns:repeat(2,1fr);
  gap:10px;
  padding:10px;
}

.card {
  background:#111827;
  padding:10px;
  border-radius:10px;
  cursor:pointer;
}

.card img {
  width:100%;
  border-radius:10px;
}

/* PLAYER */
#playerBox {
  position:fixed;
  inset:0;
  background:#000;
  display:none;
  flex-direction:column;
}

iframe {
  width:100%;
  height:50%;
}

/* CONTROLS */
.controls {
  display:flex;
  gap:10px;
  padding:10px;
}

/* EP */
#episodes {
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(60px,1fr));
  gap:8px;
  padding:10px;
  overflow:auto;
  height:50%;
}

.ep {
  background:#1f2937;
  padding:10px;
  text-align:center;
  border-radius:8px;
  cursor:pointer;
}

.ep.active {
  background:#8b5cf6;
}
</style>
</head>

<body>

<header>
  <input id="searchInput" placeholder="Search anime...">
  <button onclick="search()">Search</button>
</header>

<div id="results"></div>

<!-- PLAYER -->
<div id="playerBox">

  <button onclick="closePlayer()">❌ Close</button>

  <iframe id="iframe"></iframe>

  <div class="controls">
    <select id="server">
      <option value="primary">Primary</option>
      <option value="backup">Backup</option>
    </select>

    <button onclick="prevEp()">⏮</button>
    <button onclick="nextEp()">⏭</button>
  </div>

  <div id="episodes"></div>

</div>

<script>
const API = "https://kogemi-api-3.onrender.com";

let currentImdb = null;
let currentEp = 1;
let totalEps = 12;

/* SEARCH */
async function search() {
  const q = document.getElementById("searchInput").value;

  const res = await fetch(`${API}/search?q=${q}`);
  const data = await res.json();

  const container = document.getElementById("results");
  container.innerHTML = "";

  data.forEach(anime => {
    const title = anime.title.english || anime.title.romaji;

    const div = document.createElement("div");
    div.className = "card";

    div.innerHTML = `
      <img src="${anime.coverImage.large}">
      <p>${title}</p>
    `;

    div.onclick = () => selectAnime(title);

    container.appendChild(div);
  });
}

/* SELECT */
async function selectAnime(title) {
  const clean = title.split(":")[0];

  const [metaRes, imdbRes] = await Promise.all([
    fetch(`${API}/anime-info?title=${encodeURIComponent(clean)}`),
    fetch(`${API}/imdb?title=${encodeURIComponent(clean)}`)
  ]);

  const meta = await metaRes.json();
  const imdbData = await imdbRes.json();

  if (!imdbData.imdb) {
    alert("No stream found");
    return;
  }

  currentImdb = imdbData.imdb;

  // 💀 REAL EP COUNT FIX
  totalEps =
    meta.totalEpisodes ||
    (Array.isArray(meta.episodes) ? meta.episodes.length : meta.episodes) ||
    12;

  buildEpisodes();
  playEpisode(1);

  document.getElementById("playerBox").style.display = "flex";
}

/* PLAY */
async function playEpisode(ep) {
  currentEp = ep;

  const server = document.getElementById("server").value;

  const res = await fetch(`${API}/stream?imdb=${currentImdb}&ep=${ep}`);
  const data = await res.json();

  document.getElementById("iframe").src =
    server === "primary" ? data.primary : data.backup;

  highlightEp();
}

/* NEXT / PREV */
function nextEp() {
  if (currentEp < totalEps) playEpisode(currentEp + 1);
}

function prevEp() {
  if (currentEp > 1) playEpisode(currentEp - 1);
}

/* EP LIST */
function buildEpisodes() {
  const container = document.getElementById("episodes");
  container.innerHTML = "";

  for (let i = 1; i <= totalEps; i++) {
    const btn = document.createElement("div");
    btn.className = "ep";
    btn.innerText = i;
    btn.onclick = () => playEpisode(i);
    container.appendChild(btn);
  }
}

/* ACTIVE */
function highlightEp() {
  document.querySelectorAll(".ep").forEach(e => e.classList.remove("active"));
  document.querySelectorAll(".ep")[currentEp - 1]?.classList.add("active");
}

/* CLOSE */
function closePlayer() {
  document.getElementById("playerBox").style.display = "none";
  document.getElementById("iframe").src = "";
}

/* AUTOPLAY */
setInterval(() => {
  const iframe = document.getElementById("iframe");

  if (iframe.src && iframe.src.includes("autoNext")) {
    nextEp();
  }
}, 5000);
</script>

</body>
</html>
