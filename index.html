<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kogemi</title>

<style>
body {
  margin:0;
  font-family: Arial;
  background:#0b1220;
  color:white;
}

/* NAV */
header {
  padding:15px;
  display:flex;
  gap:10px;
  position:sticky;
  top:0;
  background:#0b1220;
  z-index:10;
}

input {
  flex:1;
  padding:12px;
  border-radius:10px;
  border:none;
}

button {
  padding:10px 15px;
  background:#8b5cf6;
  border:none;
  color:white;
  border-radius:10px;
  cursor:pointer;
}

/* SECTION */
.section {
  padding:10px;
}
.section h2 {
  margin-bottom:10px;
}

/* GRID */
.grid {
  display:grid;
  grid-template-columns:repeat(2,1fr);
  gap:10px;
}

.card {
  background:#111827;
  padding:10px;
  border-radius:10px;
  cursor:pointer;
  transition:.2s;
}
.card:hover { transform:scale(1.05); }

.card img {
  width:100%;
  border-radius:10px;
}

/* PLAYER */
#playerBox {
  position:fixed;
  inset:0;
  background:#000;
  display:none;
  flex-direction:column;
  z-index:100;
}

iframe {
  width:100%;
  height:50%;
  border:none;
}

.player-top {
  display:flex;
  justify-content:space-between;
  padding:10px;
}

.controls {
  display:flex;
  gap:10px;
  padding:10px;
}

#episodes {
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(60px,1fr));
  gap:8px;
  padding:10px;
  overflow:auto;
  height:50%;
}

.ep {
  background:#1f2937;
  padding:10px;
  text-align:center;
  border-radius:8px;
  cursor:pointer;
}
.ep.active {
  background:#8b5cf6;
}
</style>
</head>

<body>

<header>
  <input id="searchInput" placeholder="Search anime...">
  <button onclick="search()">Search</button>
</header>

<!-- HOME -->
<div class="section">
  <h2>🔥 Trending</h2>
  <div class="grid" id="trending"></div>
</div>

<div class="section">
  <h2>⭐ Popular</h2>
  <div class="grid" id="popular"></div>
</div>

<!-- PLAYER -->
<div id="playerBox">

  <div class="player-top">
    <button onclick="closePlayer()">✕</button>
    <div>Episode <span id="epNum">1</span></div>
  </div>

  <iframe id="iframe"></iframe>

  <div class="controls">
    <button onclick="prevEp()">⏮ Prev</button>
    <button onclick="nextEp()">⏭ Next</button>
  </div>

  <div id="episodes"></div>

</div>

<script>
const API = "https://kogemi-api-3.onrender.com";

let currentImdb = null;
let currentEp = 1;
let totalEps = 50;

/* 🔥 LOAD HOME */
window.onload = () => {
  loadSection("naruto", "trending");
  loadSection("one piece", "popular");
};

/* LOAD SECTIONS */
async function loadSection(q, id) {
  const res = await fetch(`${API}/search?q=${q}`);
  const data = await res.json();

  const container = document.getElementById(id);
  container.innerHTML = "";

  data.forEach(anime => {
    const title = anime.title.english || anime.title.romaji;

    const div = document.createElement("div");
    div.className = "card";

    div.innerHTML = `
      <img src="${anime.coverImage.large}">
      <p>${title}</p>
    `;

    div.onclick = () => selectAnime(title);

    container.appendChild(div);
  });
}

/* 🔍 SEARCH */
async function search() {
  const q = document.getElementById("searchInput").value;
  if (!q) return;

  loadSection(q, "trending");
}

/* SELECT */
async function selectAnime(title) {
  const clean = title.split(":")[0];

  const res = await fetch(`${API}/imdb?title=${encodeURIComponent(clean)}`);
  const data = await res.json();

  if (!data.imdb) {
    alert("No stream");
    return;
  }

  currentImdb = data.imdb;

  if (clean.toLowerCase().includes("one piece")) totalEps = 1100;
  else if (clean.toLowerCase().includes("naruto")) totalEps = 220;
  else totalEps = 50;

  buildEpisodes();
  playEpisode(1);

  document.getElementById("playerBox").style.display = "flex";
}

/* PLAY */
async function playEpisode(ep) {
  currentEp = ep;
  document.getElementById("epNum").innerText = ep;

  const res = await fetch(`${API}/stream?imdb=${currentImdb}&ep=${ep}`);
  const data = await res.json();

  document.getElementById("iframe").src =
    data.url || data.backup;

  highlightEp();
}

/* CONTROLS */
function nextEp(){ if(currentEp<totalEps) playEpisode(currentEp+1); }
function prevEp(){ if(currentEp>1) playEpisode(currentEp-1); }
function closePlayer(){
  document.getElementById("playerBox").style.display="none";
  document.getElementById("iframe").src="";
}

/* EPISODES */
function buildEpisodes() {
  const container = document.getElementById("episodes");
  container.innerHTML = "";

  for (let i = 1; i <= totalEps; i++) {
    const btn = document.createElement("div");
    btn.className = "ep";
    btn.innerText = i;
    btn.onclick = () => playEpisode(i);
    container.appendChild(btn);
  }
}

/* ACTIVE */
function highlightEp() {
  document.querySelectorAll(".ep").forEach(e => e.classList.remove("active"));
  const el = document.querySelectorAll(".ep")[currentEp - 1];
  if (el) el.classList.add("active");
}
</script>

</body>
</html>
