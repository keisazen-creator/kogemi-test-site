<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kogemi</title>

<style>
body {
  margin:0;
  font-family: Arial;
  background:#0b1220;
  color:white;
}

/* NAV */
nav {
  padding:15px;
  display:flex;
  justify-content:space-between;
  align-items:center;
}
.logo {
  font-weight:bold;
  font-size:20px;
}
.search {
  padding:10px;
  border-radius:10px;
  border:none;
}

/* HERO */
.hero {
  height:300px;
  position:relative;
  display:flex;
  align-items:flex-end;
  padding:20px;
}
.hero-bg {
  position:absolute;
  inset:0;
  background-size:cover;
  opacity:.4;
}
.hero h1 {
  z-index:2;
}

/* ROWS */
.section {
  padding:10px;
}
.row {
  display:flex;
  gap:10px;
  overflow-x:auto;
}
.card {
  min-width:140px;
  cursor:pointer;
}
.card img {
  width:100%;
  border-radius:10px;
}

/* PLAYER */
#player {
  position:fixed;
  inset:0;
  background:black;
  display:none;
  flex-direction:column;
}
iframe {
  width:100%;
  height:50%;
}
#episodes {
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(60px,1fr));
  gap:8px;
  padding:10px;
}
.ep {
  background:#1f2937;
  padding:10px;
  text-align:center;
  border-radius:6px;
  cursor:pointer;
}
.ep.active {
  background:#8b5cf6;
}
</style>
</head>

<body>

<nav>
  <div class="logo">Kogemi</div>
  <input class="search" placeholder="Search..." oninput="search(this.value)">
</nav>

<!-- HERO -->
<div class="hero">
  <div class="hero-bg" id="heroBg"></div>
  <h1 id="heroTitle">Loading...</h1>
</div>

<!-- ROWS -->
<div class="section">
  <h2>🔥 Trending</h2>
  <div class="row" id="trending"></div>
</div>

<div class="section">
  <h2>⭐ Popular</h2>
  <div class="row" id="popular"></div>
</div>

<!-- PLAYER -->
<div id="player">
  <button onclick="closePlayer()">❌ Close</button>
  <iframe id="iframe"></iframe>
  <div id="episodes"></div>
</div>

<script>
const API = "https://kogemi-api-3.onrender.com";

let imdb = null;
let currentEp = 1;
let totalEps = 50;

/* LOAD HOME */
window.onload = async () => {
  loadSection("naruto","trending");
  loadSection("one piece","popular");
};

/* LOAD ROW */
async function loadSection(q,id){
  const res = await fetch(`${API}/search?q=${q}`);
  const data = await res.json();

  const container = document.getElementById(id);
  container.innerHTML = "";

  data.forEach((anime,i)=>{
    const title = anime.title.romaji;

    if(i===0){
      document.getElementById("heroBg").style.backgroundImage =
        `url(${anime.coverImage.large})`;
      document.getElementById("heroTitle").innerText = title;
    }

    const div = document.createElement("div");
    div.className="card";

    div.innerHTML = `
      <img src="${anime.coverImage.large}">
    `;

    div.onclick = ()=>openAnime(title);

    container.appendChild(div);
  });
}

/* SEARCH */
async function search(q){
  if(!q) return;

  const res = await fetch(`${API}/search?q=${q}`);
  const data = await res.json();

  const container = document.getElementById("trending");
  container.innerHTML = "";

  data.forEach(anime=>{
    const title = anime.title.romaji;

    const div = document.createElement("div");
    div.className="card";
    div.innerHTML=`<img src="${anime.coverImage.large}">`;

    div.onclick = ()=>openAnime(title);

    container.appendChild(div);
  });
}

/* OPEN */
async function openAnime(title){
  const res = await fetch(`${API}/imdb?title=${encodeURIComponent(title)}`);
  const data = await res.json();

  if(!data.imdb){
    alert("No stream");
    return;
  }

  imdb = data.imdb;

  if(title.toLowerCase().includes("one piece")) totalEps=1100;
  else totalEps=50;

  buildEpisodes();
  play(1);

  document.getElementById("player").style.display="flex";
}

/* PLAY */
async function play(ep){
  currentEp = ep;

  const res = await fetch(`${API}/stream?imdb=${imdb}&ep=${ep}`);
  const data = await res.json();

  document.getElementById("iframe").src =
    data.url || data.backup;

  highlight();
}

/* EPISODES */
function buildEpisodes(){
  const container = document.getElementById("episodes");
  container.innerHTML="";

  for(let i=1;i<=totalEps;i++){
    const btn=document.createElement("div");
    btn.className="ep";
    btn.innerText=i;
    btn.onclick=()=>play(i);
    container.appendChild(btn);
  }
}

/* ACTIVE */
function highlight(){
  document.querySelectorAll(".ep").forEach(e=>e.classList.remove("active"));
  const el=document.querySelectorAll(".ep")[currentEp-1];
  if(el) el.classList.add("active");
}

/* CLOSE */
function closePlayer(){
  document.getElementById("player").style.display="none";
  document.getElementById("iframe").src="";
}
</script>

</body>
</html>
