<!DOCTYPE html>
<html>
<head>
<title>Kogemi</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>
body{
margin:0;
font-family:system-ui;
background:#0b1220;
color:white;
}

/* NAV */
.nav{
display:flex;
justify-content:space-between;
padding:12px;
background:linear-gradient(to right,#0b1220,#1f2937);
position:sticky;
top:0;
z-index:10;
}

.logo{
background:#7c3aed;
padding:10px;
border-radius:10px;
}

/* HERO */
.hero{
position:relative;
height:60vh;
overflow:hidden;
}

.hero img{
width:100%;
height:100%;
object-fit:cover;
filter:brightness(0.5);
}

.hero-content{
position:absolute;
bottom:20px;
left:20px;
}

.hero-title{
font-size:28px;
font-weight:bold;
margin-bottom:10px;
}

.btn{
padding:12px 18px;
border-radius:12px;
border:none;
margin-right:10px;
cursor:pointer;
}

.btn-play{
background:#7c3aed;
color:white;
}

.btn-list{
background:#1f2937;
color:white;
}

/* TRENDING */
.section{
padding:12px;
}

.row{
display:flex;
overflow-x:auto;
gap:12px;
}

.card{
min-width:140px;
background:#1f2937;
border-radius:14px;
overflow:hidden;
cursor:pointer;
}

.card img{
width:100%;
height:200px;
object-fit:cover;
}

.card-title{
padding:6px;
font-size:13px;
}

/* PLAYER */
.watch{
display:none;
padding:10px;
}

iframe{
width:100%;
aspect-ratio:16/9;
border:none;
border-radius:12px;
}

.back{
margin:10px 0;
cursor:pointer;
color:#aaa;
}
</style>
</head>

<body>

<!-- NAV -->
<div class="nav">
<div class="logo">K</div>
<div>🔍 👤 ☰</div>
</div>

<!-- HERO -->
<div id="hero" class="hero">
<img id="heroImg">
<div class="hero-content">
<div id="heroTitle" class="hero-title"></div>
<button class="btn btn-play" onclick="playHero()">▶ Watch Now</button>
</div>
</div>

<!-- TRENDING -->
<div id="home">

<div class="section">
🔥 Trending Now
<div class="row" id="trending"></div>
</div>

</div>

<!-- WATCH -->
<div id="watch" class="watch">
<div class="back" onclick="goHome()">← Back</div>
<iframe id="player"></iframe>
</div>

<script>

const API = "https://kogemi-api-3.onrender.com";

let currentAnime = "";

/* LOAD TRENDING */
async function loadTrending(){

let res = await fetch(`${API}/search?q=anime`);
let data = await res.json();

let list = data.slice(0,10);

/* HERO */
let hero = list[0];
heroImg.src = hero.coverImage.large;
heroTitle.innerText = hero.title.romaji;
currentAnime = hero.title.romaji;

/* TRENDING ROW */
trending.innerHTML="";

list.forEach(anime=>{

let card = document.createElement("div");
card.className="card";

card.innerHTML = `
<img src="${anime.coverImage.large}">
<div class="card-title">${anime.title.romaji}</div>
`;

card.onclick = ()=>openAnime(anime.title.romaji);

trending.appendChild(card);

});

}

/* HERO PLAY */
function playHero(){
openAnime(currentAnime);
}

/* OPEN */
async function openAnime(title){

let res = await fetch(`${API}/imdb?title=${title}`);
let data = await res.json();

if(!data.imdb){
alert("No stream");
return;
}

home.style.display="none";
watch.style.display="block";

playEpisode(data.imdb,1);

}

/* PLAY */
async function playEpisode(imdb,ep){

let res = await fetch(`${API}/stream?imdb=${imdb}&ep=${ep}`);
let data = await res.json();

if(!data.url){
alert("No stream");
return;
}

player.src = data.url;

}

/* BACK */
function goHome(){
watch.style.display="none";
home.style.display="block";
player.src="";
}

/* INIT */
loadTrending();

</script>

</body>
</html>
