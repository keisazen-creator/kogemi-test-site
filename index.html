<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kogemi</title>

<style>
body {
  margin:0;
  font-family: Arial;
  background:#0b1220;
  color:white;
}

/* NAV */
header {
  padding:15px;
  display:flex;
  gap:10px;
  position:sticky;
  top:0;
  background:#0b1220;
}

input {
  flex:1;
  padding:12px;
  border-radius:10px;
  border:none;
}

button {
  padding:10px 15px;
  background:#8b5cf6;
  border:none;
  color:white;
  border-radius:10px;
}

/* GRID */
#results {
  display:grid;
  grid-template-columns:repeat(2,1fr);
  gap:12px;
  padding:12px;
}

.card {
  background:#111827;
  padding:10px;
  border-radius:12px;
  cursor:pointer;
  transition:.2s;
}
.card:hover { transform:scale(1.05); }

.card img {
  width:100%;
  border-radius:10px;
}

/* PLAYER */
#playerBox {
  position:fixed;
  inset:0;
  background:#000;
  display:none;
  flex-direction:column;
}

iframe {
  width:100%;
  height:50%;
}

/* TOP BAR */
.player-top {
  display:flex;
  justify-content:space-between;
  padding:10px;
}

/* EPISODES */
#episodes {
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(60px,1fr));
  gap:8px;
  padding:10px;
  overflow:auto;
}

.ep {
  background:#1f2937;
  padding:10px;
  text-align:center;
  border-radius:8px;
}
.ep.active { background:#8b5cf6; }

.loader { text-align:center; padding:20px; }
</style>
</head>

<body>

<header>
  <input id="searchInput" placeholder="Search anime...">
  <button onclick="search()">Search</button>
</header>

<div id="results"></div>

<div id="playerBox">

  <div class="player-top">
    <button onclick="closePlayer()">✕</button>
    <div>Ep <span id="epNum">1</span></div>
  </div>

  <iframe id="iframe"></iframe>
  <div id="episodes"></div>

</div>

<script>
const API = "https://kogemi-api-3.onrender.com";
const JIKAN = "https://api.jikan.moe/v4";

let currentImdb = null;
let currentEp = 1;
let totalEps = 12;
let currentTitle = "";

/* LOAD DEFAULT */
window.onload = () => searchDefault();

async function searchDefault() {
  const res = await fetch(`${API}/search?q=naruto`);
  const data = await res.json();
  showResults(data);
}

/* SEARCH */
async function search() {
  const q = document.getElementById("searchInput").value;
  if (!q) return;

  const container = document.getElementById("results");
  container.innerHTML = "<div class='loader'>Loading...</div>";

  const res = await fetch(`${API}/search?q=${q}`);
  const data = await res.json();

  showResults(data);
}

/* SHOW */
function showResults(data) {
  const container = document.getElementById("results");
  container.innerHTML = "";

  data.forEach(anime => {
    const title = anime.title.english || anime.title.romaji;

    const div = document.createElement("div");
    div.className = "card";

    div.innerHTML = `
      <img src="${anime.coverImage.large}">
      <p>${title}</p>
    `;

    div.onclick = () => selectAnime(title);
    container.appendChild(div);
  });
}

/* SELECT */
async function selectAnime(title) {
  currentTitle = title;
  const clean = title.split(":")[0];

  // ✅ REAL EP COUNT
  try {
    const j = await fetch(`${JIKAN}/anime?q=${encodeURIComponent(clean)}&limit=1`);
    const jd = await j.json();
    totalEps = jd.data[0].episodes || 12;
  } catch {
    totalEps = 12;
  }

  const res = await fetch(`${API}/imdb?title=${encodeURIComponent(clean)}`);
  const data = await res.json();

  if (!data.imdb) {
    alert("No stream");
    return;
  }

  currentImdb = data.imdb;

  buildEpisodes();
  playEpisode(1);

  document.getElementById("playerBox").style.display = "flex";
}

/* PLAY */
async function playEpisode(ep) {
  currentEp = ep;
  document.getElementById("epNum").innerText = ep;

  const res = await fetch(`${API}/stream?imdb=${currentImdb}&ep=${ep}`);
  const data = await res.json();

  let url = data.url;

  // 🔥 FALLBACK
  if (!url) {
    url = `https://vidsrc.xyz/embed/tv/${currentImdb}/1/${ep}`;
  }

  document.getElementById("iframe").src = url;

  highlightEp();
  saveProgress();

  // 🔥 AUTO NEXT (23 MIN)
  clearTimeout(window.autoNext);
  window.autoNext = setTimeout(() => {
    nextEp();
  }, 23 * 60 * 1000);
}

/* NEXT */
function nextEp() {
  if (currentEp < totalEps) {
    playEpisode(currentEp + 1);
  }
}

/* CLOSE */
function closePlayer() {
  document.getElementById("playerBox").style.display = "none";
  document.getElementById("iframe").src = "";
}

/* EPISODES */
function buildEpisodes() {
  const container = document.getElementById("episodes");
  container.innerHTML = "";

  for (let i = 1; i <= totalEps; i++) {
    const btn = document.createElement("div");
    btn.className = "ep";
    btn.innerText = i;
    btn.onclick = () => playEpisode(i);
    container.appendChild(btn);
  }
}

/* ACTIVE */
function highlightEp() {
  document.querySelectorAll(".ep").forEach(e => e.classList.remove("active"));
  document.querySelectorAll(".ep")[currentEp - 1]?.classList.add("active");
}

/* SAVE */
function saveProgress() {
  localStorage.setItem("continue", JSON.stringify({
    title: currentTitle,
    imdb: currentImdb,
    ep: currentEp
  }));
}
</script>

</body>
</html>
