<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kogemi</title>

<style>
body {
  margin:0;
  font-family: Arial;
  background:#0b1220;
  color:white;
}

/* NAV */
header {
  padding:15px;
  display:flex;
  gap:10px;
  position:sticky;
  top:0;
  background:#0b1220;
  z-index:10;
}

input {
  flex:1;
  padding:12px;
  border-radius:10px;
  border:none;
}

button {
  padding:10px 15px;
  background:#8b5cf6;
  border:none;
  color:white;
  border-radius:10px;
  cursor:pointer;
}

/* GRID */
#results {
  display:grid;
  grid-template-columns:repeat(2,1fr);
  gap:10px;
  padding:10px;
}

.card {
  background:#111827;
  padding:10px;
  border-radius:10px;
  cursor:pointer;
  transition:.2s;
}
.card:hover { transform:scale(1.05); }

.card img {
  width:100%;
  border-radius:10px;
}

/* PLAYER */
#playerBox {
  position:fixed;
  inset:0;
  background:#000;
  display:none;
  flex-direction:column;
  z-index:100;
}

iframe {
  width:100%;
  height:50%;
  border:none;
}

/* TOP BAR PLAYER */
.player-top {
  display:flex;
  justify-content:space-between;
  padding:10px;
}

.close-btn {
  background:red;
}

/* CONTROLS */
.controls {
  display:flex;
  gap:10px;
  padding:10px;
}

/* EPISODES */
#episodes {
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(60px,1fr));
  gap:8px;
  padding:10px;
  overflow:auto;
  height:50%;
}

.ep {
  background:#1f2937;
  padding:10px;
  text-align:center;
  border-radius:8px;
  cursor:pointer;
}
.ep.active {
  background:#8b5cf6;
}

/* LOADER */
.loader {
  text-align:center;
  padding:20px;
}
</style>
</head>

<body>

<header>
  <input id="searchInput" placeholder="Search anime...">
  <button onclick="search()">Search</button>
</header>

<div id="results"></div>

<!-- PLAYER -->
<div id="playerBox">

  <div class="player-top">
    <button class="close-btn" onclick="closePlayer()">✕</button>
    <div>Episode <span id="epNum">1</span></div>
  </div>

  <iframe id="iframe"></iframe>

  <div class="controls">
    <button onclick="prevEp()">⏮ Prev</button>
    <button onclick="nextEp()">⏭ Next</button>
  </div>

  <div id="episodes"></div>

</div>

<script>
const API = "https://kogemi-api-3.onrender.com";

let currentImdb = null;
let currentEp = 1;
let totalEps = 50;

/* 🔍 SEARCH */
async function search() {
  const q = document.getElementById("searchInput").value;

  const container = document.getElementById("results");
  container.innerHTML = "<div class='loader'>Loading...</div>";

  const res = await fetch(`${API}/search?q=${q}`);
  const data = await res.json();

  container.innerHTML = "";

  data.forEach(anime => {
    const title = anime.title.english || anime.title.romaji;

    const div = document.createElement("div");
    div.className = "card";

    div.innerHTML = `
      <img src="${anime.coverImage.large}">
      <p>${title}</p>
    `;

    div.onclick = () => selectAnime(title);

    container.appendChild(div);
  });
}

/* 🎬 SELECT ANIME */
async function selectAnime(title) {
  const clean = title.split(":")[0];

  alert("Loading " + clean);

  const res = await fetch(`${API}/imdb?title=${encodeURIComponent(clean)}`);
  const data = await res.json();

  if (!data.imdb) {
    alert("No stream found");
    return;
  }

  currentImdb = data.imdb;

  // smarter episode guess
  if (clean.toLowerCase().includes("one piece")) totalEps = 1100;
  else if (clean.toLowerCase().includes("naruto")) totalEps = 220;
  else if (clean.toLowerCase().includes("bleach")) totalEps = 366;
  else totalEps = 50;

  buildEpisodes();
  playEpisode(1);

  document.getElementById("playerBox").style.display = "flex";
}

/* ▶ PLAY */
async function playEpisode(ep) {
  currentEp = ep;

  document.getElementById("epNum").innerText = ep;

  const res = await fetch(`${API}/stream?imdb=${currentImdb}&ep=${ep}`);
  const data = await res.json();

  document.getElementById("iframe").src =
    data.url || data.backup;

  highlightEp();
}

/* ⏭ NEXT */
function nextEp() {
  if (currentEp < totalEps) {
    playEpisode(currentEp + 1);
  }
}

/* ⏮ PREV */
function prevEp() {
  if (currentEp > 1) {
    playEpisode(currentEp - 1);
  }
}

/* ❌ CLOSE */
function closePlayer() {
  document.getElementById("playerBox").style.display = "none";
  document.getElementById("iframe").src = "";
}

/* EP LIST */
function buildEpisodes() {
  const container = document.getElementById("episodes");
  container.innerHTML = "";

  for (let i = 1; i <= totalEps; i++) {
    const btn = document.createElement("div");
    btn.className = "ep";
    btn.innerText = i;

    btn.onclick = () => playEpisode(i);

    container.appendChild(btn);
  }
}

/* ACTIVE */
function highlightEp() {
  document.querySelectorAll(".ep").forEach(e => e.classList.remove("active"));
  const el = document.querySelectorAll(".ep")[currentEp - 1];
  if (el) el.classList.add("active");
}

/* 🔥 AUTOPLAY */
setInterval(() => {
  const iframe = document.getElementById("iframe");

  if (iframe.src && iframe.src.includes("ended")) {
    nextEp();
  }
}, 4000);

</script>

</body>
</html>
