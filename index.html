<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kogemi Final Boss</title>

<style>
:root{
  --bg:#0b1220;
  --surface:#161d2f;
  --accent:#8b5cf6;
  --text:#fff;
  --muted:#94a3b8;
}

body{
  margin:0;
  background:var(--bg);
  color:var(--text);
  font-family:system-ui;
  display:flex;
}

/* SIDEBAR */
.sidebar{
  width:200px;
  background:#111827;
  padding:20px;
  height:100vh;
  position:fixed;
}

.sidebar h2{
  color:var(--accent);
}

.sidebar button{
  width:100%;
  margin-top:10px;
  padding:10px;
  background:#1f2937;
  border:none;
  color:white;
  cursor:pointer;
}

/* MAIN */
.main{
  margin-left:200px;
  width:100%;
}

/* NAV */
header{
  padding:15px;
  display:flex;
  justify-content:space-between;
}

input{
  padding:10px;
  border-radius:20px;
  border:none;
  width:300px;
  background:var(--surface);
  color:white;
}

/* HERO */
#hero{
  height:60vh;
  display:flex;
  align-items:end;
  padding:20px;
  background-size:cover;
}

/* ROW */
.row{
  display:flex;
  gap:10px;
  overflow:auto;
  padding:10px;
}

.card{
  min-width:140px;
  cursor:pointer;
}
.card img{
  width:100%;
  border-radius:10px;
}

/* PLAYER */
#player{
  position:fixed;
  inset:0;
  background:black;
  display:none;
  flex-direction:column;
  z-index:999;
}

iframe{
  width:100%;
  height:60%;
}

/* CONTROLS */
.controls{
  display:flex;
  gap:10px;
  padding:10px;
}

select,button{
  padding:8px;
  background:#1f2937;
  color:white;
  border:none;
}

/* EP GRID */
#episodes{
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(60px,1fr));
  gap:6px;
  padding:10px;
}

.ep{
  background:#222;
  padding:8px;
  text-align:center;
  cursor:pointer;
}

.ep.active{
  background:var(--accent);
}
</style>
</head>

<body>

<!-- SIDEBAR -->
<div class="sidebar">
  <h2>KOGEMI</h2>
  <button onclick="location.reload()">🏠 Home</button>
  <button>🔥 Trending</button>
  <button>🎭 Genres</button>
</div>

<!-- MAIN -->
<div class="main">

<header>
  <input id="search" placeholder="Search anime...">
</header>

<div id="hero"></div>

<h3 style="padding:10px">Trending</h3>
<div class="row" id="row"></div>

</div>

<!-- PLAYER -->
<div id="player">
  <button onclick="closePlayer()">❌ Close</button>

  <iframe id="frame"></iframe>

  <div class="controls">
    <!-- SERVER SWITCH -->
    <select id="server" onchange="play(currentEp)">
      <option value="primary">Primary</option>
      <option value="backup">Backup</option>
    </select>

    <!-- SEASON -->
    <select id="season" onchange="play(currentEp)">
      <option value="1">Season 1</option>
    </select>

    <button onclick="prev()">⏮</button>
    <button onclick="next()">⏭</button>
  </div>

  <div id="episodes"></div>
</div>

<script>
const API="https://kogemi-api-3.onrender.com";
const JIKAN="https://api.jikan.moe/v4";

let imdb=null;
let currentEp=1;
let totalEps=12;

/* HOME */
window.onload=async()=>{
  const res=await fetch(`${JIKAN}/top/anime`);
  const data=await res.json();

  const hero=data.data[0];
  document.getElementById("hero").style.backgroundImage=
    `url(${hero.images.jpg.large_image_url})`;

  buildRow(data.data);
};

/* ROW */
function buildRow(list){
  const row=document.getElementById("row");
  row.innerHTML="";

  list.forEach(a=>{
    const div=document.createElement("div");
    div.className="card";

    div.innerHTML=`
      <img src="${a.images.jpg.image_url}">
      <p>${a.title}</p>
    `;

    div.onclick=()=>loadAnime(a.title);
    row.appendChild(div);
  });
}

/* LOAD ANIME */
async function loadAnime(title){
  const [meta,im]=await Promise.all([
    fetch(`${API}/anime-info?title=${encodeURIComponent(title)}`),
    fetch(`${API}/imdb?title=${encodeURIComponent(title)}`)
  ]);

  const m=await meta.json();
  const i=await im.json();

  imdb=i.imdb;

  totalEps =
    m.totalEpisodes ||
    (Array.isArray(m.episodes)?m.episodes.length:m.episodes) ||
    12;

  buildEpisodes();
  play(1);

  document.getElementById("player").style.display="flex";
}

/* PLAY */
async function play(ep){
  currentEp=ep;

  const server=document.getElementById("server").value;
  const season=document.getElementById("season").value;

  const res=await fetch(`${API}/stream?imdb=${imdb}&season=${season}&ep=${ep}`);
  const data=await res.json();

  document.getElementById("frame").src =
    server==="primary"?data.primary:data.backup;

  highlight();
}

/* EPISODES */
function buildEpisodes(){
  const box=document.getElementById("episodes");
  box.innerHTML="";

  for(let i=1;i<=totalEps;i++){
    const d=document.createElement("div");
    d.className="ep";
    d.innerText=i;
    d.onclick=()=>play(i);
    box.appendChild(d);
  }
}

/* NAV */
function next(){
  if(currentEp<totalEps) play(currentEp+1);
}

function prev(){
  if(currentEp>1) play(currentEp-1);
}

/* ACTIVE */
function highlight(){
  document.querySelectorAll(".ep").forEach(e=>e.classList.remove("active"));
  document.querySelectorAll(".ep")[currentEp-1]?.classList.add("active");
}

/* CLOSE */
function closePlayer(){
  document.getElementById("player").style.display="none";
  document.getElementById("frame").src="";
}
</script>

</body>
</html>
