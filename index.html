<!DOCTYPE html>
<html>
<head>
<title>Kogemi</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>
:root{
--bg:#0b1220;
--card:#1f2937;
--accent:#8b5cf6;
--text:#fff;
--muted:#9ca3af;
}

body{
margin:0;
font-family:system-ui;
background:var(--bg);
color:var(--text);
}

/* NAV */
nav{
display:flex;
padding:12px;
gap:10px;
background:#111827;
position:sticky;
top:0;
z-index:10;
}

.logo{
font-weight:bold;
font-size:18px;
color:var(--accent);
}

.search{
flex:1;
padding:10px;
border:none;
border-radius:10px;
background:var(--card);
color:white;
}

/* HERO */
.hero{
height:60vh;
position:relative;
display:flex;
align-items:flex-end;
padding:20px;
background-size:cover;
background-position:center;
}

.overlay{
position:absolute;
inset:0;
background:linear-gradient(to top,#0b1220,transparent);
}

.hero-content{
position:relative;
z-index:2;
}

.title{
font-size:26px;
font-weight:bold;
}

.desc{
font-size:14px;
color:var(--muted);
margin:10px 0;
}

.btn{
background:var(--accent);
padding:10px 20px;
border:none;
border-radius:10px;
color:white;
cursor:pointer;
}

/* ROW */
.row{
display:flex;
gap:10px;
overflow-x:auto;
padding:10px;
}

.card{
min-width:140px;
background:var(--card);
border-radius:10px;
overflow:hidden;
cursor:pointer;
}

.card img{
width:100%;
height:200px;
object-fit:cover;
}

.card-title{
padding:6px;
font-size:13px;
}

/* PLAYER */
.player{
display:none;
padding:10px;
}

iframe{
width:100%;
aspect-ratio:16/9;
border:none;
border-radius:10px;
}

.back{
margin-bottom:10px;
cursor:pointer;
color:var(--muted);
}

/* EP */
.episodes{
display:grid;
grid-template-columns:repeat(5,1fr);
gap:6px;
margin-top:10px;
}

.ep{
background:var(--card);
padding:10px;
text-align:center;
border-radius:8px;
cursor:pointer;
}

.ep.active{
background:var(--accent);
}
</style>
</head>

<body>

<nav>
<div class="logo">Kogemi</div>
<input class="search" id="search" placeholder="Search anime...">
</nav>

<!-- HERO -->
<div class="hero" id="hero">
<div class="overlay"></div>
<div class="hero-content">
<div class="title" id="title">Loading...</div>
<div class="desc" id="desc"></div>
<button class="btn" onclick="watch()">▶ Watch Now</button>
</div>
</div>

<!-- TRENDING -->
<div class="row" id="row"></div>

<!-- PLAYER -->
<div class="player" id="playerBox">
<div class="back" onclick="back()">← Back</div>
<iframe id="player"></iframe>
<div class="episodes" id="episodes"></div>
</div>

<script>
const API="https://kogemi-api-3.onrender.com";
const JIKAN="https://api.jikan.moe/v4";

let current=null;
let imdb=null;

/* SEARCH */
document.getElementById("search").oninput=async(e)=>{
let q=e.target.value;
if(q.length<3)return;

let res=await fetch(`${JIKAN}/anime?q=${q}`);
let data=await res.json();

if(data.data && data.data[0]){
loadAnime(data.data[0]);
}
};

/* LOAD TRENDING */
async function loadTrending(){
let res=await fetch(`${JIKAN}/top/anime`);
let data=await res.json();

let list=data.data.slice(0,10);

document.getElementById("row").innerHTML="";

list.forEach(a=>{
let card=document.createElement("div");
card.className="card";

card.innerHTML=`
<img src="${a.images.jpg.image_url}">
<div class="card-title">${a.title}</div>
`;

card.onclick=()=>loadAnime(a);

document.getElementById("row").appendChild(card);
});

loadAnime(list[0]);
}

/* LOAD HERO */
function loadAnime(a){
current=a;

document.getElementById("hero").style.backgroundImage=
`url(${a.images.jpg.large_image_url})`;

document.getElementById("title").innerText=a.title;
document.getElementById("desc").innerText=a.synopsis || "";

/* reset */
imdb=null;
}

/* CLEAN TITLE */
function clean(t){
return t.split(":")[0].split("-")[0].trim();
}

/* WATCH */
async function watch(){

let title=clean(current.title);

let res=await fetch(`${API}/imdb?title=${title}`);
let data=await res.json();

if(!data.imdb){
alert("No stream");
return;
}

imdb=data.imdb;

document.getElementById("playerBox").style.display="block";

loadEpisodes(50);
play(1);
}

/* PLAY */
async function play(ep){

let iframe=document.getElementById("player");

/* try API */
let res=await fetch(`${API}/stream?imdb=${imdb}&ep=${ep}`);
let data=await res.json();

if(data.url){
iframe.src=data.url;
}else{
/* fallback */
iframe.src=`https://vidsrc.xyz/embed/tv/${imdb}/1/${ep}`;
}

/* active */
document.querySelectorAll(".ep").forEach(e=>e.classList.remove("active"));
document.querySelectorAll(".ep")[ep-1]?.classList.add("active");
}

/* EPISODES */
function loadEpisodes(n){
let box=document.getElementById("episodes");
box.innerHTML="";

for(let i=1;i<=n;i++){
let el=document.createElement("div");
el.className="ep";
el.innerText=i;
el.onclick=()=>play(i);
box.appendChild(el);
}
}

/* BACK */
function back(){
document.getElementById("playerBox").style.display="none";
document.getElementById("player").src="";
}

/* INIT */
loadTrending();
</script>

</body>
</html>
