<!DOCTYPE html>
<html>
<head>
<title>Kogemi - One Piece</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>

body{
margin:0;
font-family:Arial;
background:#0b1220;
color:white;
}

/* HEADER */
.header{
display:flex;
justify-content:space-between;
padding:15px;
background:#0b1220;
}

.logo{
background:#7c3aed;
padding:10px;
border-radius:12px;
}

/* HERO */
.hero{
position:relative;
height:250px;
background:url('https://wallpaperaccess.com/full/1119442.jpg') center/cover;
}

.overlay{
position:absolute;
width:100%;
height:100%;
background:linear-gradient(to bottom, transparent, #0b1220);
}

/* POSTER */
.poster{
margin-top:-80px;
padding:15px;
display:flex;
gap:15px;
align-items:flex-end;
}

.poster img{
width:120px;
border-radius:15px;
}

.title{
font-size:26px;
font-weight:bold;
}

.info{
font-size:14px;
color:#9ca3af;
margin-top:5px;
}

/* BUTTON */
.watch{
margin:15px;
background:#7c3aed;
padding:12px;
border:none;
border-radius:12px;
color:white;
width:calc(100% - 30px);
font-size:16px;
cursor:pointer;
}

/* PLAYER */
.player{
display:none;
padding:15px;
}

iframe{
width:100%;
height:220px;
border-radius:12px;
border:none;
}

/* ARC BUTTONS */
.arcs{
display:flex;
overflow-x:auto;
gap:10px;
padding:10px;
}

.arc{
background:#1f2937;
padding:10px 15px;
border-radius:20px;
white-space:nowrap;
cursor:pointer;
}

.arc.active{
background:#7c3aed;
}

/* EPISODES */
.episodes{
display:grid;
grid-template-columns:repeat(5,1fr);
gap:10px;
padding:15px;
}

.ep{
background:#1f2937;
padding:10px;
border-radius:10px;
text-align:center;
cursor:pointer;
}

.ep:hover{
background:#7c3aed;
}

</style>

</head>

<body>

<!-- HEADER -->
<div class="header">
<div class="logo">K</div>
<div>Kogemi</div>
<div>☰</div>
</div>

<!-- HERO -->
<div class="hero">
<div class="overlay"></div>
</div>

<!-- POSTER + INFO -->
<div class="poster">
<img src="https://m.media-amazon.com/images/I/81f8b3M7bPL.jpg">
<div>
<div class="title">ONE PIECE</div>
<div class="info">⭐ 8.8 • 1999 • 24m/ep</div>
</div>
</div>

<!-- WATCH BUTTON -->
<button class="watch" onclick="showPlayer()">▶ Watch Now</button>

<!-- PLAYER -->
<div class="player" id="playerBox">
<iframe id="player"
src=""></iframe>
</div>

<!-- ARC SELECT -->
<div class="arcs" id="arcList"></div>

<!-- EPISODES -->
<div class="episodes" id="episodes"></div>

<script>

/* SHOW PLAYER */
function showPlayer(){
document.getElementById("playerBox").style.display="block";
playEpisode(1);
}

/* PLAY */
function playEpisode(num){
document.getElementById("player").src =
`https://vidfast.pro/tv/tt0388629/1/${num}?autoPlay=true`;
}

/* ARCS */
const arcs = [
{name:"East Blue", start:1, end:61},
{name:"Alabasta", start:62, end:135},
{name:"Skypiea", start:136, end:206},
{name:"Water 7", start:207, end:325},
{name:"Marineford", start:326, end:516},
{name:"Dressrosa", start:517, end:746},
{name:"Wano", start:747, end:1155}
];

/* LOAD ARCS */
let arcContainer = document.getElementById("arcList");

arcs.forEach((arc, index)=>{
let btn = document.createElement("div");
btn.className="arc";
btn.innerText = arc.name;

btn.onclick = ()=>{
document.querySelectorAll(".arc").forEach(a=>a.classList.remove("active"));
btn.classList.add("active");
loadEpisodes(arc.start, arc.end);
};

if(index===0){
btn.classList.add("active");
loadEpisodes(arc.start, arc.end);
}

arcContainer.appendChild(btn);
});

/* LOAD EPISODES */
function loadEpisodes(start, end){
let container = document.getElementById("episodes");
container.innerHTML="";

for(let i=start;i<=end;i++){
let ep = document.createElement("div");
ep.className="ep";
ep.innerText=i;

ep.onclick=()=>playEpisode(i);

container.appendChild(ep);
}
}

</script>

</body>
</html>
