<!DOCTYPE html>
<html>
<head>
<title>Kogemi</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>
body{
margin:0;
font-family:system-ui;
background:#0b1220;
color:white;
}

/* HEADER */
.header{
padding:16px;
text-align:center;
background:#111827;
font-size:20px;
font-weight:bold;
letter-spacing:1px;
}

/* SEARCH */
.search{
width:100%;
padding:14px;
border:none;
background:#1f2937;
color:white;
border-radius:12px;
font-size:15px;
}

/* GRID */
.grid{
display:grid;
grid-template-columns:repeat(2,1fr);
gap:12px;
padding:12px;
}

.card{
background:#1f2937;
border-radius:14px;
overflow:hidden;
cursor:pointer;
transition:0.25s;
}

.card:hover{
transform:scale(1.05);
}

.card img{
width:100%;
height:220px;
object-fit:cover;
}

.card-title{
padding:10px;
font-size:14px;
}

/* WATCH */
.watch{
display:none;
padding:10px;
}

/* PLAYER */
.player-box{
position:relative;
border-radius:14px;
overflow:hidden;
}

iframe{
width:100%;
aspect-ratio:16/9;
border:none;
}

/* LOADER */
.loader{
position:absolute;
inset:0;
display:flex;
align-items:center;
justify-content:center;
background:rgba(0,0,0,0.5);
font-size:14px;
}

/* BACK */
.back{
padding:10px;
cursor:pointer;
color:#9ca3af;
}

/* EPISODES */
.episodes{
display:grid;
grid-template-columns:repeat(5,1fr);
gap:8px;
margin-top:12px;
}

.ep{
background:#1f2937;
padding:12px;
border-radius:12px;
text-align:center;
cursor:pointer;
transition:0.2s;
}

.ep.active{
background:#7c3aed;
}

.ep:hover{
background:#7c3aed;
}
</style>
</head>

<body>

<div class="header">Kogemi</div>

<!-- HOME -->
<div id="home">

<div style="padding:12px">
<input class="search" placeholder="Search anime..." oninput="searchAnime(this.value)">
</div>

<div class="grid" id="results"></div>

</div>

<!-- WATCH -->
<div id="watch" class="watch">

<div class="back" onclick="goHome()">← Back</div>

<div class="player-box">
<div class="loader" id="loader">Loading...</div>
<iframe id="player"></iframe>
</div>

<div class="episodes" id="episodes"></div>

</div>

<script>

const API = "https://kogemi-api-3.onrender.com";

/* SEARCH */
async function searchAnime(q){
if(!q){
results.innerHTML="";
return;
}
let res = await fetch(`${API}/search?q=${q}`);
let data = await res.json();
showResults(data);
}

/* SHOW */
function showResults(list){
results.innerHTML="";

list.forEach(anime=>{
let card = document.createElement("div");
card.className="card";

card.innerHTML = `
<img src="${anime.coverImage.large}">
<div class="card-title">${anime.title.romaji}</div>
`;

card.onclick = ()=>openAnime(anime.title.romaji);
results.appendChild(card);
});
}

/* OPEN */
async function openAnime(title){

let res = await fetch(`${API}/imdb?title=${title}`);
let data = await res.json();

if(!data.imdb){
alert("No stream");
return;
}

home.style.display="none";
watch.style.display="block";

/* smart episode count */
let total = 24;
if(title.toLowerCase().includes("one piece")) total = 1100;
if(title.toLowerCase().includes("naruto")) total = 500;

loadEpisodes(data.imdb, total);
playEpisode(data.imdb, 1);

}

/* PLAY */
async function playEpisode(imdb, ep){

loader.style.display="flex";
player.src="";

/* highlight */
document.querySelectorAll(".ep").forEach(e=>e.classList.remove("active"));
if(document.querySelectorAll(".ep")[ep-1]){
document.querySelectorAll(".ep")[ep-1].classList.add("active");
}

let res = await fetch(`${API}/stream?imdb=${imdb}&ep=${ep}`);
let data = await res.json();

if(!data.url){
loader.innerText="No stream 😢";
return;
}

player.src = data.url;

/* hide loader */
setTimeout(()=>loader.style.display="none",1000);

}

/* EPISODES */
function loadEpisodes(imdb,total){

episodes.innerHTML="";

for(let i=1;i<=total;i++){
let el = document.createElement("div");
el.className="ep";
el.innerText=i;

el.onclick=()=>playEpisode(imdb,i);

episodes.appendChild(el);
}

}

/* BACK */
function goHome(){
watch.style.display="none";
home.style.display="block";
player.src="";
}

</script>

</body>
</html>
